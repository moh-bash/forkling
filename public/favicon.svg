<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Cream background circle -->
  <circle cx="24" cy="24" r="24" fill="#FDF6F0"/>

  <!-- Body — soft pink -->
  <ellipse cx="24" cy="30" rx="10" ry="8" fill="#F4A8A8"/>

  <!-- Head -->
  <ellipse cx="24" cy="22" rx="7" ry="6" fill="#F4A8A8"/>

  <!-- Gill frills left (3 bumps) -->
  <circle cx="13" cy="16" r="2.5" fill="#E07070"/>
  <circle cx="11" cy="12" r="2" fill="#E07070"/>
  <circle cx="14" cy="10" r="1.8" fill="#E07070"/>

  <!-- Gill frills right (3 bumps) -->
  <circle cx="35" cy="16" r="2.5" fill="#E07070"/>
  <circle cx="37" cy="12" r="2" fill="#E07070"/>
  <circle cx="34" cy="10" r="1.8" fill="#E07070"/>

  <!-- Eyes -->
  <circle cx="21" cy="21" r="2" fill="#2D1B4E"/>
  <circle cx="27" cy="21" r="2" fill="#2D1B4E"/>
  <!-- Eye shine -->
  <circle cx="21.8" cy="20.2" r="0.6" fill="white"/>
  <circle cx="27.8" cy="20.2" r="0.6" fill="white"/>

  <!-- Smile -->
  <path d="M21 25 Q24 27 27 25" stroke="#C05050" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Right arm pointing forward -->
  <path d="M31 29 Q37 27 40 24" stroke="#F4A8A8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Pointing hand dots -->
  <circle cx="40" cy="24" r="2" fill="#F4A8A8"/>
  <circle cx="42" cy="22" r="1.2" fill="#E07070"/>

  <!-- Left arm -->
  <path d="M17 29 Q13 31 11 30" stroke="#F4A8A8" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Tail -->
  <ellipse cx="24" cy="39" rx="5" ry="3" fill="#E8A0A0" transform="rotate(-10 24 39)"/>
  <ellipse cx="22" cy="42" rx="3.5" ry="2" fill="#E07070" transform="rotate(-15 22 42)"/>

  <!-- Terracotta outline trace on head -->
  <ellipse cx="24" cy="22" rx="7" ry="6" stroke="#C87070" stroke-width="0.8" fill="none"/>
</svg>
